<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>STRICH Popup Scanner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="reset.css"/>
    <link rel="stylesheet" type="text/css" href="scan-popup.css"/>
</head>
<body>

<main>
    <header>
        <h1>STRICH Popup Scanner</h1>
        <a href="/">EXIT</a>
    </header>

    <p>This sample demonstrates the use of the popup scanner. Please print the
        <a href="test-sheet.pdf">PDF test sheet</a> in this repository.</p>

    <h2>Scan single barcode</h2>

    <fieldset>
        <label for="serial">Serial number (15 chars, at least one non-numeric)</label>
        <div>
            <input type="text" id="serial" name="serial" pattern="[A-Z0-9\-_\/]{14}">
            <button id="scan_serial" data-input="serial">Scan</button>
        </div>

        <label for="mac">MAC address (AA:BB:CC:DD:EE:FF)</label>
        <div>
            <input type="text" id="mac" name="mac" pattern="[A-Z0-9]{2}:[A-Z0-9]{2}:[A-Z0-9]{2}:[A-Z0-9]{2}:[A-Z0-9]{2}:[A-Z0-9]{2}">
            <button id="scan_mac" data-input="mac">Scan</button>
        </div>

        <label for="imei">IMEI (15-17 digits)</label>
        <div>
            <input type="number" id="imei" name="imei" pattern="\d{15,17}">
            <button id="scan_imei" data-input="imei">Scan</button>
        </div>
    </fieldset>

    <h2>Scan all barcodes</h2>
    <p>Scan until all three barcodes are scanned.</p>
    <button id="scan_all">Scan All</button>
</main>

<script type="module" src="scan-popup.js"></script>

</body>
</html>
