<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiple Scans</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" type="text/css" href="reset.css"/>
    <link rel="stylesheet" type="text/css" href="scan-multiple.css"/>
</head>
<body>

<main>
    <header>
        <h1>Multiple Scans</h1>
        <a href="/">EXIT</a>
    </header>

    <p>This example illustrates scanning four distinct Code 128 barcodes or QR Codes. Scanning stops when all
        four codes are scanned.</p>

    <div class="host-element">
        <!-- BarcodeReader will live here -->
    </div>

    <div class="barcode-grid">
        <output id="scannedCode0">-</output>
        <output id="scannedCode1">-</output>
        <output id="scannedCode2">-</output>
        <output id="scannedCode3">-</output>
    </div>

    <button id="finishScanning" disabled>FINISH SCANNING</button>
</main>

<script type="module" src="scan-multiple.js"></script>
</body>
</html>
